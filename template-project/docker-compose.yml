version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: template-project-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: template_project
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d template_project"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
